name: Daily Reminder

on:
  schedule:
    # 早晨提醒：北京时间 7:00 (UTC 23:00)
    - cron: '0 23 * * *'
    # 中午提醒：北京时间 12:30 (UTC 4:30)
    - cron: '30 4 * * *'
    # 下午提醒：北京时间 16:00 (UTC 8:00)
    - cron: '0 8 * * *'
    # 睡前提醒：北京时间 20:30 (UTC 12:30)
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      reminder_type:
        description: '提醒类型'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - noon
          - afternoon
          - bedtime

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Determine reminder type
        id: determine_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.reminder_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" == "23" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "04" ]; then
              echo "type=noon" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "08" ]; then
              echo "type=afternoon" >> $GITHUB_OUTPUT
            else
              echo "type=bedtime" >> $GITHUB_OUTPUT
            fi
          fi
          WEEKDAY=$(date +%w)
          echo "weekday=$WEEKDAY" >> $GITHUB_OUTPUT
      
      - name: Send DingTalk reminder
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          REMINDER_TYPE: ${{ steps.determine_type.outputs.type }}
          WEEKDAY: ${{ steps.determine_type.outputs.weekday }}
          USER_NAME: "尊敬的用户"
        run: python scripts/send_reminder.py
